name: Deploy Backend to VPS

on:
  push:
    branches: [hieu]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: ENV_FILE
          script: |
            set -e
            cd /var/www/equippeer
            git pull origin hieu
            npm install --omit=dev
            if [ -n "$ENV_FILE" ]; then
              printf '%s\n' "$ENV_FILE" > .env
            fi
            grep -q "FRONTEND_URL" .env || printf 'FRONTEND_URL=https://p2-p-tech-camping-rental-platform.vercel.app\n' >> .env
            pm2 restart equippeer --update-env
            pm2 save
